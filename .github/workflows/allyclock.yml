name: allyclock

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  NETLIFY_SITE_ID: 364c7c8c-e254-40cb-a663-64a396836b20

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: Production
      url: https://allyclock.netlify.app

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build --if-present

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
        run: npx --yes netlify-cli deploy --prod --dir=dist/allyclock/browser --site="$NETLIFY_SITE_ID"
