name: ios-testflight

on:
  push:
    branches:
      - main
    paths:
      - 'apps/ios/**'
      - 'packages/AllyClockCore/**'
  workflow_dispatch:

concurrency:
  group: ios-testflight
  cancel-in-progress: false

jobs:
  testflight:
    runs-on: macos-26
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select latest Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -n 1)"

      - name: Install App Store Connect API key
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_KEY_P8: ${{ secrets.ASC_API_KEY_P8 }}
        run: |
          mkdir -p "$HOME/private_keys"
          printf '%s' "$ASC_API_KEY_P8" > "$HOME/private_keys/AuthKey_${ASC_API_KEY_ID}.p8"

      - name: Archive
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          xcodebuild \
            -project apps/ios/AllyClock.xcodeproj \
            -scheme AllyClock \
            -destination 'generic/platform=iOS' \
            -archivePath "$RUNNER_TEMP/AllyClock.xcarchive" \
            CURRENT_PROJECT_VERSION=$((GITHUB_RUN_NUMBER + 1)) \
            archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID"

      - name: Upload to TestFlight
        env:
          ASC_API_KEY_ID: ${{ secrets.ASC_API_KEY_ID }}
          ASC_API_ISSUER_ID: ${{ secrets.ASC_API_ISSUER_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
          	<key>method</key>
          	<string>app-store-connect</string>
          	<key>destination</key>
          	<string>upload</string>
          	<key>signingStyle</key>
          	<string>automatic</string>
          	<key>teamID</key>
          	<string>77R8AFM4HU</string>
          	<key>uploadSymbols</key>
          	<true/>
          	<key>manageAppVersionAndBuildNumber</key>
          	<true/>
          </dict>
          </plist>
          PLIST
          xcodebuild \
            -exportArchive \
            -archivePath "$RUNNER_TEMP/AllyClock.xcarchive" \
            -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$HOME/private_keys/AuthKey_${ASC_API_KEY_ID}.p8" \
            -authenticationKeyID "$ASC_API_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_API_ISSUER_ID"
