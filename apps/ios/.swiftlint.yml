included:
  - AllyClock
  - AllyClockTests

excluded:
  - AllyClock.xcodeproj
  - build
  - DerivedData
  - "**/.build"

line_length:
  warning: 120
  error: 200
  ignores_comments: true
  ignores_urls: true

identifier_name:
  min_length: 2
  excluded:
    - id
    - x
    - y

type_name:
  min_length: 3

file_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 80
  error: 150

disabled_rules:
  - trailing_whitespace
  - todo

opt_in_rules:
  - empty_count
  - closure_spacing
  - explicit_init
  - first_where
  - force_unwrapping
  - redundant_nil_coalescing
  - sorted_imports
  - unused_import
