<button
  type="button"
  class="tm-button"
  [class.active]="isMocked()"
  [class.hidden]="!visible() && !panelOpen() && !isMocked()"
  (click)="togglePanel()"
>
  Time
</button>
@if (panelOpen()) {
  <div class="tm-panel">
    <label class="tm-field">
      <span class="tm-field-head">
        <span>Mock date &amp; time</span>
        <span class="tm-status" [class.mock]="isMocked()">
          <span class="tm-status-dot"></span>
          <span class="tm-status-text">{{ isMocked() ? 'Mock' : 'Live' }}</span>
        </span>
      </span>
      <input
        type="datetime-local"
        [value]="draft()"
        (input)="draft.set($any($event.target).value)"
      />
    </label>

    <div class="tm-slider">
      <span class="tm-slider-label"
        >Day <strong>{{ dayLabel() }}</strong></span
      >
      <input
        type="range"
        min="1"
        [max]="maxDayOfYear()"
        [value]="dayOfYear()"
        (input)="onDaySlider($any($event.target).value)"
      />
    </div>

    <div class="tm-slider">
      <span class="tm-slider-label"
        >Time <strong>{{ timeLabel() }}</strong></span
      >
      <input
        type="range"
        min="0"
        max="1439"
        [value]="minuteOfDay()"
        (input)="onTimeSlider($any($event.target).value)"
      />
    </div>

    <div class="tm-actions">
      <button type="button" class="tm-live" (click)="goLive()">Live</button>
      <button type="button" class="tm-apply" (click)="apply()">Apply</button>
    </div>
  </div>
}
