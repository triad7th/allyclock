<button
  type="button"
  class="tm-button"
  [class.active]="isMocked()"
  [class.hidden]="!visible() && !panelOpen() && !isMocked()"
  (click)="togglePanel()"
>
  Time Machine
</button>
@if (panelOpen()) {
  <div class="tm-panel">
    <label class="tm-field">
      <span>Mock date &amp; time</span>
      <input
        type="datetime-local"
        [value]="draft()"
        (input)="draft.set($any($event.target).value)"
      />
    </label>
    <div class="tm-actions">
      <button type="button" class="tm-live" (click)="goLive()">Live</button>
      <button type="button" class="tm-apply" (click)="apply()">Apply</button>
    </div>
  </div>
}
