<button
  type="button"
  class="tm-button"
  [class.active]="isMocked()"
  [class.hidden]="!visible() && !panelOpen() && !isMocked()"
  (click)="togglePanel()"
>
  Time
</button>
@if (panelOpen()) {
  <div class="tm-overlay" [class.closing]="panelClosing()">
    <div
      class="tm-backdrop"
      role="button"
      tabindex="0"
      aria-label="Dismiss Time Machine"
      (click)="cancel()"
      (keydown.enter)="cancel()"
      (keydown.space)="cancel()"
    ></div>
    <div class="tm-sheet" role="dialog" aria-modal="true" aria-label="Time Machine">
      <div class="tm-grabber"></div>

      <header class="tm-nav">
        <button
          type="button"
          class="tm-corner tm-corner-cancel"
          (click)="cancel()"
          aria-label="Cancel"
          title="Cancel"
        >
          <app-icon name="xmark" />
        </button>
        <div class="tm-titlebox">
          <span class="tm-title">Time Machine</span>
        </div>
        <div class="tm-trailing">
          <button
            type="button"
            class="tm-live-btn"
            [class.is-live]="!isMocked()"
            (click)="toggleLive()"
            aria-label="Toggle live or mock time"
          >
            <span class="tm-live-dot"></span>
            <span>{{ isMocked() ? 'Mock' : 'Live' }}</span>
          </button>
          <button
            type="button"
            class="tm-corner tm-corner-apply"
            (click)="apply()"
            aria-label="Apply time"
            title="Apply"
          >
            <app-icon name="checkmark" />
          </button>
        </div>
      </header>

      @if (tzPickerOpen()) {
        <div class="tm-tzpicker">
          <input
            class="tm-tz-search"
            type="text"
            [value]="tzQuery()"
            (input)="tzQuery.set($any($event.target).value)"
            placeholder="Search time zone"
            aria-label="Search time zone"
            autofocus
          />
          <div class="tm-tz-list">
            @for (z of filteredZones(); track z.id) {
              <button
                type="button"
                class="tm-tz-option"
                [class.active]="z.id === tzDraft()"
                (click)="pickTimeZone(z.id)"
              >
                {{ z.label }}
              </button>
            } @empty {
              <p class="tm-tz-empty">No matching time zone</p>
            }
          </div>
          <button type="button" class="tm-tz-back" (click)="closeTzPicker()">Cancel</button>
        </div>
      } @else {
        <div class="tm-controls">
          <div class="tm-field tm-field-datetime">
            <span class="tm-field-label">Date &amp; Time</span>
            <input
              class="tm-datetime"
              type="datetime-local"
              [value]="draft()"
              (input)="onDateTime($any($event.target).value)"
            />
            <select class="tm-gmt" (change)="onGmtSelect($any($event.target).value)" aria-label="GMT offset">
              @for (g of gmtOptions(); track g.offset) {
                <option [value]="g.offset" [selected]="g.offset === selectedOffset()">{{ g.label }}</option>
              }
            </select>
          </div>
          <div class="tm-field tm-field-slider">
            <div class="tm-field-head">
              <span class="tm-field-label">Day</span>
              <span class="tm-field-value">{{ dayLabel() }}</span>
            </div>
            <input
              type="range"
              min="1"
              [max]="maxDayOfYear()"
              [value]="dayOfYear()"
              [style.--fill.%]="dayFillPercent()"
              (input)="onDaySlider($any($event.target).value)"
            />
          </div>
          <div class="tm-field tm-field-slider">
            <div class="tm-field-head">
              <span class="tm-field-label">Time</span>
              <span class="tm-field-value">{{ timeLabel() }}</span>
            </div>
            <input
              type="range"
              min="0"
              max="1439"
              [value]="minuteOfDay()"
              [style.--fill.%]="timeFillPercent()"
              (input)="onTimeSlider($any($event.target).value)"
            />
          </div>
          <div class="tm-field tm-field-tz">
            <span class="tm-field-label">Time Zone</span>
            <button type="button" class="tm-tz" (click)="openTzPicker()">{{ activeZoneLabel() }}</button>
          </div>
        </div>
      }
    </div>
  </div>
}
