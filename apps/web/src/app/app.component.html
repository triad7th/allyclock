<main class="face-host">
  <ng-container [ngComponentOutlet]="activeFace().component" />
</main>
<app-configure-button [pinned]="sheetOpen()" (open)="openSheet()" />
@if (sheetOpen()) {
  <app-face-picker-sheet
    [activeFaceId]="activeFaceId()"
    (select)="selectFace($event)"
    (close)="closeSheet()"
  />
}
