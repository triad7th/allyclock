<app-sheet sheetLabel="Fullscreen" (closed)="onSheetClosed()">
  <div class="cfg">
    <app-nav-header title="Fullscreen" [flush]="true">
      <app-icon-button navLeading icon="xmark" label="Close" (click)="close()" />
    </app-nav-header>

    <!-- ── Knobs panel ─────────────────────────────────────────────────── -->
    <div class="knobs-panel">

      <!-- Time section -->
      <div class="knobs-section">
        <div class="knobs-section-header">
          <span class="knobs-section-label">Time</span>
        </div>

        <div class="knobs-row">
          <input
            type="range"
            class="knobs-slider"
            min="0.5" max="2.0" step="0.05"
            [value]="editingPreset().sections.time.sizeScale"
            [style.--fill]="fillPct(editingPreset().sections.time.sizeScale, 0.5, 2.0)"
            data-knob="time-size"
            (input)="onSectionSize('time', $event)"
          />
          <span class="knobs-row-value">{{ editingPreset().sections.time.sizeScale | number:'1.2-2' }}</span>
        </div>
      </div>

      <!-- Date section -->
      <div class="knobs-section">
        <div class="knobs-section-header">
          <span class="knobs-section-label">Date</span>
        </div>

        <div class="knobs-row">
          <input
            type="range"
            class="knobs-slider"
            min="0.5" max="2.0" step="0.05"
            [value]="editingPreset().sections.month.sizeScale"
            [style.--fill]="fillPct(editingPreset().sections.month.sizeScale, 0.5, 2.0)"
            data-knob="date-size"
            (input)="onDateSize($event)"
          />
          <span class="knobs-row-value">{{ editingPreset().sections.month.sizeScale | number:'1.2-2' }}</span>
        </div>
      </div>

      <!-- Weekday section (global) -->
      <div class="knobs-section">
        <div class="knobs-toggle-row">
          <span class="knobs-section-label">Weekday</span>
          <button
            type="button"
            class="knobs-toggle"
            [class.on]="store.state().showWeekday"
            data-knob="weekday-visible"
            (click)="toggleWeekday()"
            [attr.aria-label]="store.state().showWeekday ? 'Hide Weekday' : 'Show Weekday'"
          >
            <span class="knobs-toggle-thumb"></span>
          </button>
        </div>
      </div>

      <!-- GMT section (global) -->
      <div class="knobs-section">
        <div class="knobs-toggle-row">
          <span class="knobs-section-label">GMT</span>
          <button
            type="button"
            class="knobs-toggle"
            [class.on]="store.state().showGmt"
            data-knob="gmt-visible"
            (click)="toggleGmt()"
            [attr.aria-label]="store.state().showGmt ? 'Hide GMT' : 'Show GMT'"
          >
            <span class="knobs-toggle-thumb"></span>
          </button>
        </div>
      </div>

      <!-- Bar section -->
      <div class="knobs-section">
        <div class="knobs-toggle-row">
          <span class="knobs-section-label">Bar</span>
          <button
            type="button"
            class="knobs-toggle"
            [class.on]="editingPreset().bar.visible"
            data-knob="bar-visible"
            (click)="toggleBar()"
            [attr.aria-label]="editingPreset().bar.visible ? 'Hide Bar' : 'Show Bar'"
          >
            <span class="knobs-toggle-thumb"></span>
          </button>
        </div>
      </div>

    </div>
  </div>
</app-sheet>
