<div class="stage" [style.transform]="'translateY(' + translateY() + 'px)'">
  <img
    #schedImg
    [src]="imageUrl()"
    alt="Daily schedule"
    (load)="onImageLoad($event)"
    (error)="imageUrl.set(defaultImageSrc)"
  />
  <div class="red-box" [style.top.px]="redBoxTop()" [style.height.px]="redBoxHeight()"></div>
</div>
@if (configOpen() && !configClosing()) {
  <button type="button" class="gear check" aria-label="Save configuration" (click)="onSaveClick()">
    <app-icon name="checkmark" />
  </button>
}
<button
  type="button"
  class="gear"
  [class.hidden]="(!gearVisible() && !configOpen()) || configClosing()"
  [class.cancel-mode]="configOpen()"
  [attr.aria-label]="configOpen() ? 'Cancel configuration' : 'Configure schedule'"
  (click)="onGearClick()"
>
  @if (configOpen()) {
    <app-icon name="xmark" />
  } @else {
    <app-icon name="gearshape" />
  }
</button>
@if (configOpen()) {
  <app-schedule-config
    [class.closing]="configClosing()"
    (saved)="onConfigSaved()"
    (cancelled)="onConfigCancelled()"
  />
}
