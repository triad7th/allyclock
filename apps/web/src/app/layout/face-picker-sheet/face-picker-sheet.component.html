<app-sheet sheetLabel="Choose a clock face" (closed)="onSheetClosed()">
  <div class="picker-panel">
    <app-nav-header title="Faces" [flush]="true">
      <app-icon-button navLeading icon="xmark" label="Close" (click)="close()" />
    </app-nav-header>

    <div class="options">
      @for (face of faces; track face.id) {
        <button
          type="button"
          class="face-option"
          [class.active]="face.id === activeFaceId()"
          (click)="selectFace(face.id)"
        >
          <span class="preview" aria-hidden="true">
            <span class="preview-viewport">
              <ng-container
                [ngComponentOutlet]="face.component"
                [ngComponentOutletInjector]="previewInjector()"
              />
            </span>
          </span>
          <span class="name">{{ face.displayName }}</span>
        </button>
      }
    </div>
  </div>
</app-sheet>
