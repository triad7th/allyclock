<app-sheet sheetLabel="Adjustment" (closed)="onSheetClosed()">
  <div class="cfg">
    <app-nav-header title="Adjustment" [flush]="true">
      <app-icon-button navLeading icon="xmark" label="Close" (click)="close()" />
    </app-nav-header>

    <!-- ── Knobs panel ─────────────────────────────────────────────────── -->
    <div class="knobs-panel">
      <!-- Time section -->
      <div class="knobs-section">
        <div class="knobs-section-header">
          <span class="knobs-section-label">Time</span>
        </div>

        <div class="knobs-row">
          <input
            type="range"
            class="knobs-slider"
            min="0.5"
            max="2.0"
            step="0.05"
            [value]="editingFields().sections.time.sizeScale"
            [style.--fill]="fillPct(editingFields().sections.time.sizeScale, 0.5, 2.0)"
            data-knob="time-size"
            (input)="onSectionSize('time', $event)"
          />
          <span class="knobs-row-value">{{
            editingFields().sections.time.sizeScale | number: '1.2-2'
          }}</span>
        </div>
      </div>

      <!-- Date section -->
      <div class="knobs-section">
        <div class="knobs-section-header">
          <span class="knobs-section-label">Date</span>
        </div>

        <div class="knobs-row">
          <input
            type="range"
            class="knobs-slider"
            min="0.5"
            max="2.0"
            step="0.05"
            [value]="editingFields().sections.month.sizeScale"
            [style.--fill]="fillPct(editingFields().sections.month.sizeScale, 0.5, 2.0)"
            data-knob="date-size"
            (input)="onDateSize($event)"
          />
          <span class="knobs-row-value">{{
            editingFields().sections.month.sizeScale | number: '1.2-2'
          }}</span>
        </div>
      </div>
    </div>
  </div>
</app-sheet>
