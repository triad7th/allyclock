<app-sheet sheetLabel="Settings" (closed)="onSheetClosed()">
  <div class="cfg">
    <app-nav-header title="Settings" [flush]="true">
      <app-icon-button navLeading icon="xmark" label="Close" (click)="close()" />
    </app-nav-header>

    @if (!zonePickerOpen()) {
    <!-- ── Toggles panel ───────────────────────────────────────────────── -->
    <div class="knobs-panel">

      <!-- Seconds -->
      <div class="knobs-section">
        <div class="knobs-toggle-row">
          <span class="knobs-section-label">Seconds</span>
          <button
            type="button"
            class="knobs-toggle"
            [class.on]="showSeconds()"
            data-knob="seconds-visible"
            (click)="toggleSeconds()"
            [attr.aria-label]="showSeconds() ? 'Hide Seconds' : 'Show Seconds'"
          >
            <span class="knobs-toggle-thumb"></span>
          </button>
        </div>
      </div>

      <!-- Weekday -->
      <div class="knobs-section">
        <div class="knobs-toggle-row">
          <span class="knobs-section-label">Weekday</span>
          <button
            type="button"
            class="knobs-toggle"
            [class.on]="showWeekday()"
            data-knob="weekday-visible"
            (click)="toggleWeekday()"
            [attr.aria-label]="showWeekday() ? 'Hide Weekday' : 'Show Weekday'"
          >
            <span class="knobs-toggle-thumb"></span>
          </button>
        </div>
      </div>

      <!-- GMT -->
      <div class="knobs-section">
        <div class="knobs-toggle-row">
          <span class="knobs-section-label">GMT</span>
          <button
            type="button"
            class="knobs-toggle"
            [class.on]="showGmt()"
            data-knob="gmt-visible"
            (click)="toggleGmt()"
            [attr.aria-label]="showGmt() ? 'Hide GMT' : 'Show GMT'"
          >
            <span class="knobs-toggle-thumb"></span>
          </button>
        </div>
      </div>

      <!-- Bar -->
      <div class="knobs-section">
        <div class="knobs-segment-row">
          <span class="knobs-section-label">Bar</span>
          <div class="knobs-segment" role="radiogroup" data-knob="bar-mode" aria-label="Bar mode">
            @for (m of barModes; track m.mode) {
              <button
                type="button"
                role="radio"
                class="knobs-segment-btn"
                [class.on]="barMode() === m.mode"
                [attr.data-mode]="m.mode"
                [attr.aria-checked]="barMode() === m.mode"
                (click)="setBarMode(m.mode)"
              >{{ m.label }}</button>
            }
          </div>
        </div>
      </div>

      <!-- Time Zone -->
      <div class="knobs-section">
        <div class="knobs-toggle-row">
          <span class="knobs-section-label">Time Zone</span>
          <button type="button" class="knobs-tz" data-knob="time-zone" (click)="openZonePicker()">
            {{ faceZoneLabel() }}
          </button>
        </div>
      </div>

    </div>
    } @else {
      <div class="knobs-zonepicker">
        <app-zone-picker [options]="zoneOptions" [selectedId]="faceZone()" (picked)="pickZone($event)" />
        <button type="button" class="knobs-tz-back" (click)="closeZonePicker()">Cancel</button>
      </div>
    }
  </div>
</app-sheet>
