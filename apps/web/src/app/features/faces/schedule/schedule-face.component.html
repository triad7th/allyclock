<div class="stage" [style.transform]="'translateY(' + translateY() + 'px)'">
  <img
    #schedImg
    [src]="imageUrl()"
    alt="Daily schedule"
    (load)="onImageLoad($event)"
    (error)="imageUrl.set(defaultImageSrc)"
  />
  <div class="red-box" [style.top.px]="redBoxTop()" [style.height.px]="redBoxHeight()"></div>
</div>
<button
  appAutoHide
  #ah="autoHide"
  [revealBlocked]="configOpen()"
  type="button"
  class="gear"
  [class.hidden]="!ah.visible() || configOpen()"
  aria-label="Configure schedule"
  (click)="onGearClick()"
>
  <app-icon name="gearshape" />
</button>
@if (configOpen()) {
  <app-schedule-config (closed)="onConfigClosed()" />
}
