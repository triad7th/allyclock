<div class="card-row">
  <app-flag class="flag" [countryCode]="countryCode()" />
  <div class="times">
    <div class="time">
      <span class="digits">{{ big().digits }}</span>
      <span class="flank">
        @if (big().ampm; as ampm) {
          <span class="ampm">{{ ampm }}</span>
        }
        <span class="seconds">{{ big().seconds }}</span>
      </span>
    </div>
    <div class="date">
      <span class="cal">{{ dateLabel() }}</span>
      @if (city(); as c) {
        <span class="sep">·</span>
        <span class="city">{{ c }}</span>
      }
      <span class="sep">·</span>
      <span class="offset"><app-icon class="globe" name="globe" />{{ offset() }}</span>
    </div>
  </div>
</div>
